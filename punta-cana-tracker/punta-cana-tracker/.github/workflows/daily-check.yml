name: Chequeo diario de ofertas Bayahibe

on:
  schedule:
    # 09:00 hora Argentina (UTC-3) = 12:00 UTC. Ajustá si querés otro horario.
    - cron: "0 12 * * *"
  workflow_dispatch: {} # permite correrlo manualmente desde la pestaña Actions

jobs:
  check-ofertas:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout del repo
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Instalar dependencias
        run: |
          pip install -r requirements.txt
          playwright install --with-deps chromium

      - name: Restaurar credenciales de Google
        run: echo "${{ secrets.GOOGLE_CREDENTIALS_JSON }}" > credentials.json

      - name: Correr el chequeo
        run: python main.py

      - name: Subir evidencia de debug (si falló algo)
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: debug-evidence
          path: debug/
          if-no-files-found: ignore
